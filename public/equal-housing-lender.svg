<!--
  Equal Housing Lender mark — REGULATORY ASSET PLACEHOLDER.
  This is a recreated rendering of the Equal Housing Lender symbol composed from primitives.

  PRE-LAUNCH REQUIREMENT: source the official Equal Housing Lender artwork from HUD or
  the appropriate regulator before publishing. Do NOT publish this placeholder to production
  without IT firm + compliance review confirming the mark satisfies regulatory requirements.

  Reference: https://www.hud.gov/sites/dfiles/AdminSec/documents/EqualHousingLenderLogo.png
